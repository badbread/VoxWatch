# Ruff linter configuration for VoxWatch
# https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 100

[lint]
# Start with a reasonable set — not too strict for contributors
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "SIM",  # simplify
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function call in default arg — common in FastAPI
    "SIM108", # ternary operator — readability preference
    "SIM105", # contextlib.suppress — prefer explicit try/except for clarity
    "SIM117", # nested with — prefer explicit for readability
    "B027",   # empty method in ABC — intentional default implementations
    "B904",   # raise from err — adds noise in fallback chains
]

[lint.isort]
known-first-party = ["voxwatch"]

[format]
quote-style = "double"
indent-style = "space"
