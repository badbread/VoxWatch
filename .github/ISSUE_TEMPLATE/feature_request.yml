name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. VoxWatch is shaped by community feedback.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you're imagining.
      placeholder: "It would be great if VoxWatch could..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this be useful? What problem does it solve?
      placeholder: "Currently when X happens, I have to Y. This feature would..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard UI
        - Audio / TTS
        - AI Vision
        - Dispatch Pipeline
        - Camera Compatibility
        - Home Assistant Integration
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: false
